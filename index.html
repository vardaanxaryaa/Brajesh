<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brajesh Arya — OSINT Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=VT323&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --green:#00ff41;
  --green-dim:#00aa2a;
  --green-glow:rgba(0,255,65,0.15);
  --red:#ff0040;
  --cyan:#00f5ff;
  --amber:#ffb700;
  --bg:#020c02;
  --panel:rgba(0,20,4,0.85);
  --border:rgba(0,255,65,0.25);
  --font-mono:'Share Tech Mono',monospace;
  --font-display:'Orbitron',monospace;
  --font-crt:'VT323',monospace;
}

body{
  min-height:100vh;
  background:var(--bg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:var(--font-mono);
  color:var(--green);
  overflow-x:hidden;
  position:relative;
}

/* Scanlines overlay */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.15) 2px,
    rgba(0,0,0,0.15) 4px
  );
  pointer-events:none;
  z-index:999;
}

/* Grid background */
body::after{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,255,65,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,65,0.03) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
}

/* Matrix rain canvas */
#matrix-canvas{
  position:fixed;
  inset:0;
  opacity:0.07;
  pointer-events:none;
  z-index:1;
}

.wrapper{
  position:relative;
  z-index:10;
  width:100%;
  max-width:560px;
  padding:20px;
}

/* Top bar */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
  font-size:11px;
  color:var(--green-dim);
  letter-spacing:2px;
}

.topbar .status-dot{
  width:6px; height:6px;
  border-radius:50%;
  background:var(--green);
  display:inline-block;
  margin-right:6px;
  animation:blink 1.2s step-end infinite;
}

@keyframes blink{50%{opacity:0;}}

.topbar .uptime{
  font-family:var(--font-crt);
  font-size:16px;
  letter-spacing:1px;
}

/* Main container */
.container{
  border:1px solid var(--border);
  border-radius:4px;
  background:var(--panel);
  backdrop-filter:blur(12px);
  position:relative;
  overflow:hidden;
  animation:slideIn 0.6s cubic-bezier(0.22,1,0.36,1);
}

@keyframes slideIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* Corner decorations */
.container::before,.container::after{
  content:'';
  position:absolute;
  width:18px; height:18px;
  border-color:var(--green);
  border-style:solid;
  z-index:2;
}
.container::before{top:0;left:0;border-width:2px 0 0 2px;}
.container::after{bottom:0;right:0;border-width:0 2px 2px 0;}

/* Header */
.header{
  padding:20px 24px 16px;
  border-bottom:1px solid var(--border);
  position:relative;
}

.header-row{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:4px;
}

.logo-icon{
  width:38px; height:38px;
  border:1.5px solid var(--green);
  border-radius:3px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px;
  position:relative;
  flex-shrink:0;
  box-shadow:0 0 12px var(--green-glow), inset 0 0 12px var(--green-glow);
}

.logo-icon::before{
  content:'';
  position:absolute;
  inset:3px;
  border:1px solid rgba(0,255,65,0.3);
  border-radius:1px;
}

h1{
  font-family:var(--font-display);
  font-size:18px;
  font-weight:900;
  letter-spacing:3px;
  text-shadow:0 0 20px var(--green), 0 0 40px rgba(0,255,65,0.4);
  line-height:1.2;
}

.tagline{
  font-size:10px;
  color:var(--green-dim);
  letter-spacing:4px;
  text-transform:uppercase;
  margin-top:2px;
}

.header-meta{
  margin-left:auto;
  text-align:right;
  font-size:10px;
  color:var(--green-dim);
  letter-spacing:1px;
}

.header-meta .version{
  font-family:var(--font-display);
  font-size:12px;
  color:var(--cyan);
  display:block;
}

/* Progress / scan bar */
.scan-bar{
  margin-top:10px;
  height:2px;
  background:rgba(0,255,65,0.1);
  border-radius:2px;
  overflow:hidden;
  position:relative;
}

.scan-bar-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg, var(--green-dim), var(--green), var(--cyan));
  transition:width 0.4s ease;
  box-shadow:0 0 8px var(--green);
}

/* Body */
.body{
  padding:22px 24px;
}

/* Section label */
.section-label{
  font-size:10px;
  letter-spacing:3px;
  color:var(--green-dim);
  text-transform:uppercase;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:8px;
}
.section-label::before{
  content:'//';
  color:var(--green);
  font-size:12px;
}

/* Input group */
.input-group{
  position:relative;
  margin-bottom:16px;
}

.input-prefix{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  font-size:14px;
  color:var(--green-dim);
  pointer-events:none;
  z-index:1;
}

.phone-input{
  width:100%;
  padding:14px 14px 14px 40px;
  background:rgba(0,255,65,0.04);
  border:1px solid var(--border);
  border-radius:4px;
  color:var(--green);
  font-family:var(--font-display);
  font-size:20px;
  letter-spacing:4px;
  outline:none;
  transition:all 0.2s;
  caret-color:var(--green);
}

.phone-input::placeholder{
  color:rgba(0,255,65,0.2);
  letter-spacing:2px;
  font-size:14px;
}

.phone-input:focus{
  border-color:var(--green);
  box-shadow:0 0 0 2px rgba(0,255,65,0.1), 0 0 20px rgba(0,255,65,0.08);
  background:rgba(0,255,65,0.07);
}

.phone-input:focus + .input-border-animate{
  width:100%;
}

.input-border-animate{
  position:absolute;
  bottom:-1px; left:0;
  height:1px;
  width:0;
  background:var(--green);
  transition:width 0.4s ease;
  box-shadow:0 0 6px var(--green);
}

/* Execute button */
.btn-execute{
  width:100%;
  padding:14px;
  background:transparent;
  border:1px solid var(--green);
  border-radius:4px;
  color:var(--green);
  font-family:var(--font-display);
  font-size:13px;
  font-weight:700;
  letter-spacing:3px;
  cursor:pointer;
  transition:all 0.2s;
  position:relative;
  overflow:hidden;
  text-transform:uppercase;
  margin-bottom:10px;
}

.btn-execute::before{
  content:'';
  position:absolute;
  inset:0;
  background:var(--green);
  transform:translateX(-100%);
  transition:transform 0.25s ease;
  z-index:0;
}

.btn-execute:hover::before{transform:translateX(0);}
.btn-execute:hover{color:#000;box-shadow:0 0 20px rgba(0,255,65,0.4);}
.btn-execute span{position:relative;z-index:1;}
.btn-execute:active{transform:scale(0.99);}

/* Action row */
.action-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:16px;
}

.btn-action{
  padding:10px;
  background:transparent;
  border:1px solid rgba(0,255,65,0.2);
  border-radius:4px;
  color:var(--green-dim);
  font-family:var(--font-mono);
  font-size:12px;
  letter-spacing:2px;
  cursor:pointer;
  transition:all 0.2s;
  text-transform:uppercase;
}

.btn-action:hover{
  border-color:var(--cyan);
  color:var(--cyan);
  box-shadow:0 0 10px rgba(0,245,255,0.15);
}

/* Status bar */
.status-bar{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(0,255,65,0.1);
  border-radius:3px;
  font-size:11px;
  letter-spacing:2px;
  color:var(--green-dim);
  margin-bottom:14px;
}

.status-indicator{
  width:5px; height:5px;
  border-radius:50%;
  background:var(--green);
  flex-shrink:0;
  animation:blink 1.5s infinite;
}

.status-indicator.loading{
  background:var(--amber);
  animation:blink 0.4s infinite;
}

.status-indicator.error{
  background:var(--red);
  animation:none;
}

/* Result box */
.result-box{
  display:none;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(0,255,65,0.2);
  border-radius:4px;
  position:relative;
  overflow:hidden;
}

.result-box::before{
  content:'OUTPUT_STREAM';
  position:absolute;
  top:10px; right:12px;
  font-size:9px;
  letter-spacing:3px;
  color:rgba(0,255,65,0.25);
}

.result-header{
  padding:8px 14px;
  border-bottom:1px solid rgba(0,255,65,0.1);
  font-size:10px;
  letter-spacing:3px;
  color:var(--green-dim);
  display:flex;
  align-items:center;
  gap:8px;
}

.result-content{
  padding:14px;
  font-size:13px;
  white-space:pre-wrap;
  max-height:280px;
  overflow-y:auto;
  line-height:1.7;
  color:var(--green);
}

.result-content.error-text{
  color:var(--red);
}

.result-content::-webkit-scrollbar{width:4px;}
.result-content::-webkit-scrollbar-track{background:transparent;}
.result-content::-webkit-scrollbar-thumb{background:rgba(0,255,65,0.3);border-radius:2px;}

/* Typing cursor for result */
.result-cursor{
  display:inline-block;
  width:8px; height:14px;
  background:var(--green);
  vertical-align:middle;
  animation:blink 0.7s step-end infinite;
  margin-left:2px;
}

/* Divider */
.divider{
  display:flex;
  align-items:center;
  gap:10px;
  margin:14px 0;
  font-size:9px;
  letter-spacing:3px;
  color:rgba(0,255,65,0.2);
}
.divider::before,.divider::after{
  content:'';flex:1;
  height:1px;
  background:rgba(0,255,65,0.1);
}

/* Footer */
.footer{
  padding:12px 24px;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:10px;
  letter-spacing:2px;
  color:rgba(0,255,65,0.35);
}

.footer .credit{
  color:var(--green-dim);
}

.footer .hash{
  font-family:var(--font-crt);
  font-size:14px;
  color:rgba(0,245,255,0.4);
}

/* Glitch effect on hover for title */
@keyframes glitch1{
  0%,100%{clip-path:inset(0 0 90% 0);transform:translateX(-2px);}
  50%{clip-path:inset(0 0 90% 0);transform:translateX(2px);}
}
@keyframes glitch2{
  0%,100%{clip-path:inset(90% 0 0 0);transform:translateX(2px);}
  50%{clip-path:inset(90% 0 0 0);transform:translateX(-2px);}
}
.glitch-wrap{position:relative;display:inline-block;}
.glitch-wrap:hover .g1,.glitch-wrap:hover .g2{display:block;}
.g1,.g2{
  display:none;
  position:absolute;
  top:0;left:0;
  width:100%;
  color:var(--cyan);
  animation:glitch1 0.18s infinite;
}
.g2{color:var(--red);animation:glitch2 0.18s infinite 0.06s;}

/* Loading spinner chars */
.loading-chars{
  display:none;
  text-align:center;
  padding:10px;
  font-family:var(--font-crt);
  font-size:22px;
  letter-spacing:4px;
  color:var(--amber);
}
</style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div class="wrapper">

  <!-- Top system bar -->
  <div class="topbar">
    <span><span class="status-dot"></span>SYS_ONLINE</span>
    <span class="uptime" id="uptime-counter">UP: 00:00:00</span>
    <span>NODE_ID: 0x4C41</span>
  </div>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="header-row">
        <div class="logo-icon">⬡</div>
        <div>
          <div class="glitch-wrap">
            <h1>BRAJESH ARYA</h1>
            <div class="g1">BRAJESH ARYA</div>
            <div class="g2">BRAJESH ARYA</div>
          </div>
          <div class="tagline">mobile intelligence terminal</div>
        </div>
        <div class="header-meta">
          <span class="version">v3.7.2</span>
          <span>BUILD_2024</span>
        </div>
      </div>
      <div class="scan-bar"><div class="scan-bar-fill" id="scan-fill"></div></div>
    </div>

    <!-- Body -->
    <div class="body">

      <div class="section-label">target input</div>

      <div class="input-group">
        <div class="input-prefix">+91</div>
        <input
          class="phone-input"
          type="tel"
          id="phone"
          maxlength="10"
          placeholder="0000000000"
          autocomplete="off"
          spellcheck="false"
        >
        <div class="input-border-animate"></div>
      </div>

      <button class="btn-execute" onclick="fetchData()">
        <span>[ EXECUTE SEARCH ]</span>
      </button>

      <div class="action-row">
        <button class="btn-action" onclick="copyData()">&gt; COPY JSON</button>
        <button class="btn-action" onclick="downloadData()">&gt; SAVE FILE</button>
      </div>

      <!-- Status -->
      <div class="status-bar" id="status-bar">
        <div class="status-indicator" id="status-dot"></div>
        <span id="status-text">AWAITING TARGET COORDINATES</span>
      </div>

      <!-- Loading -->
      <div class="loading-chars" id="loading-anim">
        SCANNING... ▓▓░░░░ PLEASE WAIT
      </div>

      <!-- Result -->
      <div class="result-box" id="result-box">
        <div class="result-header">
          <span>●</span>
          <span>DATA STREAM RECEIVED</span>
        </div>
        <div class="result-content" id="result"></div>
      </div>

    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="credit">DESIGNED BY <span style="color:var(--cyan);letter-spacing:3px;">BRAJESH Instagram@_7mx2h_</span></span>
      <span class="hash" id="hash-display">0x00000000</span>
    </div>

  </div>

</div>

<script>
// Matrix rain
(function(){
  const canvas = document.getElementById('matrix-canvas');
  const ctx = canvas.getContext('2d');
  let w = canvas.width = window.innerWidth;
  let h = canvas.height = window.innerHeight;
  const cols = Math.floor(w/18);
  const drops = Array(cols).fill(1);
  const chars = 'アイウエオカキクケコ0123456789ABCDEF$#@%!<>/\\|{}[]';

  function draw(){
    ctx.fillStyle='rgba(2,12,2,0.05)';
    ctx.fillRect(0,0,w,h);
    ctx.fillStyle='#00ff41';
    ctx.font='14px Share Tech Mono';
    drops.forEach((y,i)=>{
      const c=chars[Math.floor(Math.random()*chars.length)];
      ctx.fillStyle=Math.random()>0.95?'#00f5ff':'#00ff41';
      ctx.fillText(c,i*18,y*18);
      if(y*18>h && Math.random()>0.975) drops[i]=0;
      drops[i]++;
    });
  }
  setInterval(draw,50);
  window.addEventListener('resize',()=>{
    w=canvas.width=window.innerWidth;
    h=canvas.height=window.innerHeight;
  });
})();

// Uptime counter
(function(){
  let s=0;
  const el=document.getElementById('uptime-counter');
  setInterval(()=>{
    s++;
    const h=String(Math.floor(s/3600)).padStart(2,'0');
    const m=String(Math.floor((s%3600)/60)).padStart(2,'0');
    const sec=String(s%60).padStart(2,'0');
    el.textContent=`UP: ${h}:${m}:${sec}`;
  },1000);
})();

// Random hash display
(function(){
  const el=document.getElementById('hash-display');
  setInterval(()=>{
    const h='0x'+Math.floor(Math.random()*0xFFFFFFFF).toString(16).toUpperCase().padStart(8,'0');
    el.textContent=h;
  },2000);
})();

const resultBox=document.getElementById('result-box');
const resultEl=document.getElementById('result');
const statusText=document.getElementById('status-text');
const statusDot=document.getElementById('status-dot');
const loadingAnim=document.getElementById('loading-anim');
const scanFill=document.getElementById('scan-fill');

let lastJSON='';

function setStatus(msg, type='idle'){
  statusText.textContent=msg;
  statusDot.className='status-indicator';
  if(type==='loading') statusDot.classList.add('loading');
  if(type==='error') statusDot.classList.add('error');
}

function typewriterOutput(text, isError=false){
  resultEl.className='result-content'+(isError?' error-text':'');
  resultEl.textContent='';
  resultBox.style.display='block';
  let i=0;
  const speed=text.length>500?4:12;
  function type(){
    if(i<text.length){
      resultEl.textContent+=text[i++];
      setTimeout(type,speed);
      resultEl.scrollTop=resultEl.scrollHeight;
    }
  }
  type();
}

async function fetchData(){
  const phone=document.getElementById('phone').value.trim();
  resultBox.style.display='none';
  resultEl.className='result-content';
  resultEl.textContent='';
  lastJSON='';

  if(!/^\d{10}$/.test(phone)){
    setStatus('ERR: INVALID TARGET — REQUIRES 10 DIGITS','error');
    typewriterOutput('⚠ SCAN FAILED\n\nInvalid mobile number.\nPlease enter a valid 10-digit number.',true);
    return;
  }

  setStatus('INITIALIZING SCAN SEQUENCE...','loading');
  loadingAnim.style.display='block';
  scanFill.style.width='0%';

  // Animate scan bar
  let pct=0;
  const barInterval=setInterval(()=>{
    pct=Math.min(pct+Math.random()*8,90);
    scanFill.style.width=pct+'%';
  },200);

  try{
    setStatus('QUERYING INTELLIGENCE NODE...','loading');
    const url=`https://new-apiix-root-coders.deno.dev/?num=${phone}&key=PHON-EB3K-L9M2-2024A`;
    const res=await fetch(url);

    if(!res.ok) throw new Error('SERVER ERROR: HTTP '+res.status);

    const data=await res.json();
    lastJSON=JSON.stringify(data,null,2);

    clearInterval(barInterval);
    scanFill.style.width='100%';
    loadingAnim.style.display='none';
    setStatus('DATA ACQUIRED — STREAM COMPLETE','idle');
    typewriterOutput(lastJSON);

  } catch(err){
    clearInterval(barInterval);
    scanFill.style.width='0%';
    loadingAnim.style.display='none';
    setStatus('ERR: CONNECTION FAILED','error');
    typewriterOutput('⚠ NETWORK ERROR\n\n'+err.message+'\n\nRetrying may resolve this issue.',true);
  }
}

function copyData(){
  if(!lastJSON){
    setStatus('ERR: NO DATA BUFFER TO COPY','error');
    return;
  }
  navigator.clipboard.writeText(lastJSON).then(()=>{
    setStatus('COPIED TO CLIPBOARD — BUFFER READY','idle');
  });
}

function downloadData(){
  if(!lastJSON){
    setStatus('ERR: NO DATA BUFFER TO SAVE','error');
    return;
  }
  const blob=new Blob([lastJSON],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='lafda_report.json'; a.click();
  URL.revokeObjectURL(url);
  setStatus('FILE EXPORTED — DOWNLOAD INITIATED','idle');
}

const inp=document.getElementById('phone');
inp.addEventListener('keypress',e=>{if(e.key==='Enter') fetchData();});
inp.addEventListener('input',()=>{
  const val=inp.value.replace(/\D/g,'');
  inp.value=val;
});
inp.focus();
</script>
</body>
</html>
